<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AXIOM CORE | KRYON · Cloud Edition</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2322d3ee' stroke-width='2'><path d='M12 2a4 4 0 0 0-4 4 4 4 0 0 0-3 6.6 4 4 0 0 0 1.3 7A4 4 0 0 0 12 22a4 4 0 0 0 5.7-2.4 4 4 0 0 0 1.3-7A4 4 0 0 0 16 6a4 4 0 0 0-4-4Z'/></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22d3ee">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <canvas id="brainCanvas"></canvas>
  <div class="app-shell" id="appShell"></div>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h3><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 0-4 4 4 4 0 0 0-3 6.6 4 4 0 0 0 1.3 7A4 4 0 0 0 12 22a4 4 0 0 0 5.7-2.4 4 4 0 0 0 1.3-7A4 4 0 0 0 16 6a4 4 0 0 0-4-4Z"/></svg> KRYON · Cloud Edition</h3>
      <p style="color:var(--dim);font-size:0.7rem;margin-bottom:6px;">Tus datos se sincronizan en la nube con Supabase</p>
      <input type="password" id="loginPass" placeholder="Contraseña maestra">
      <button class="pill-btn primary" style="margin-top:12px;width:100%;justify-content:center;" onclick="App.login()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Acceder
      </button>
      <p style="color:var(--muted);font-size:0.55rem;margin-top:8px;" id="loginStatus"></p>
    </div>
  </div>

  <script src="js/brain.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/connections.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/healer.js"></script>
  <script src="js/pipeline.js"></script>
  <script src="js/claude.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
